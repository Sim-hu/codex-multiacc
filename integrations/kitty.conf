# Optional kitty key bindings for cx.
#
# Include from kitty.conf:
#   include /absolute/path/to/codex-multiacc/integrations/kitty.conf
#
# ctrl+shift+a opens the account picker as an overlay.
# ctrl+shift+c starts Codex with the currently active account as an overlay.
# ctrl+shift+r opens the reset dashboard as an overlay.
# ctrl+shift+s prints a compact statusline as an overlay.
map ctrl+shift+a launch --type=overlay --cwd=current cx pick
map ctrl+shift+c launch --type=overlay --cwd=current cx
map ctrl+shift+r launch --type=overlay --cwd=current cx gui
map ctrl+shift+s launch --type=overlay --cwd=current cx statusline --fresh
